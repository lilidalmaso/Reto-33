    <link rel="preload" as="image" href="/chica.webp" fetchpriority="high" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        background: linear-gradient(180deg, #f5f0e8 0%, #a8ccee 35%, #3a72b0 67%, #0d1b3e 100%);
        background-attachment: fixed;
        color: #0d1b3e;
        font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
        overflow-x: hidden;
        min-height: 100vh;
      }
      /* Fallback positionné en absolute pour ne PAS pousser le contenu */
      #fallback {
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 100vh;
        pointer-events: none;
        z-index: 0;
        transition: opacity 0.4s ease;
      }
      #fallback-img {
        position: absolute;
        right: 0; top: 0;
        height: 100%; width: 42%;
        object-fit: cover;
        object-position: center top;
      }
      /* Root prend toute la place dès le début */
      #root { position: relative; z-index: 1; min-height: 100vh; }
    </style>
  </head>
  <body>
    <!-- Image préchargée en absolute — ne cause AUCUN décalage -->
    <div id="fallback">
      <img src="/chica.webp" fetchpriority="high" decoding="async"
        id="fallback-img" alt="" aria-hidden="true" width="600" height="900" />
    </div>

    <div id="root"></div>

    <script>
      (function() {
        function init() {
          const r = document.getElementById('root');
          const f = document.getElementById('fallback');
          if (!r) { setTimeout(init, 20); return; }
          const obs = new MutationObserver((_, o) => {
            if (r.hasChildNodes()) {
              if (f) { f.style.opacity = '0'; setTimeout(() => f.remove(), 400); }
              o.disconnect();
            }
          });
          obs.observe(r, { childList: true });
        }
        init();
      })();
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
